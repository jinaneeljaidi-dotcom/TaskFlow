<!DOCTYPE html> 
<html lang="fr">
<head> 
    <meta charset="UTF-8"> 
    <title>Ajouter un Examen</title>
</head> 
<body> 
    <h1>Créer un nouvel examen</h1> 
    <form id="form-examen">    
       <!-- Champ : nom de l'examen -->
       <label> nom de l'examen:</label> 
       <input type="text" id="nomExamen" required > <br><br>
       <!-- Champ : durée en minutes -->
       <label> duree en minutes:</label>
       <input type="text" id="dureeMinute" required > <br><br>
       <!-- Zone de texte : description -->
       <label> zone de texte:</label>
       <input type="text" id="zoneText" required > <br><br>
       <!-- Champ : nom du propriétaire -->
       <label> nom de prioritaire:</label> 
       <input type="text" id="prioritaire" required > <br><br>
       <button type="submit">Ajouter l'examen</button>
       </form>
       <!-- Lier le fichier JavaScript -->
       <script src="script.js"></script>
</body>
</html>
