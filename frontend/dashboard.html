<!-- Personal dashboard showing task and project metrics -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TaskFlow — Dashboard</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav id="nav"></nav>
  <div class="container">
    <h1>My Dashboard</h1>
    <div class="grid" style="margin-bottom:2rem">
      <div class="card metric">
        <div class="number" id="active-projects">—</div>
        <div>Active Projects</div>
      </div>
      <div class="card metric">
        <div class="number" id="assigned-tasks">—</div>
        <div>Assigned Tasks</div>
      </div>
      <div class="card metric">
        <div class="number" id="done-tasks">—</div>
        <div>Completed</div>
      </div>
      <div class="card metric" style="color:#ef4444">
        <div class="number" id="overdue-tasks" style="color:#ef4444">—</div>
        <div>Overdue</div>
      </div>
    </div>
    <div class="card">
      <h2>In Progress</h2>
      <ul id="inprogress-list" style="padding-left:1.2rem;line-height:2"></ul>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/notifications.js"></script>
  <script src="/js/dashboard.js"></script>
</body>
</html>
