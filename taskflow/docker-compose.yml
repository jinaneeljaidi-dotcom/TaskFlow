version: '3.8'
services:
  mongodb:
    image: mongo:6
    container_name: taskflow-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  backend:
    build: ./backend
    container_name: taskflow-backend
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    depends_on:
      - mongodb

volumes:
  mongo-data: